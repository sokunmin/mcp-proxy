version: '3.8'

services:
  mcp-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Pass through environment variables for package managers
      - UV_PYTHON_PREFERENCE=only-system
    command: [
      "--pass-environment",
      "--port=8080", 
      "--host=0.0.0.0",
      "--named-server-config", 
      "./servers.json"
    ]
    restart: unless-stopped
    # Optional: Add health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/status", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s